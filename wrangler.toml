name = "studymaster-worker"
main = "worker.js"
compatibility_date = "2024-01-01"

# Deploy: wrangler deploy
# Adicionar variável de ambiente via painel Cloudflare ou:
# wrangler secret put GROQ_API_KEY

[vars]
# Não coloque a chave aqui! Use wrangler secret ou o painel do Cloudflare
# Settings > Workers & Pages > studymaster-worker > Settings > Variables

# Cloudflare AI — para geração de embeddings (BGE-M3, 1024 dimensões)
[ai]
binding = "AI"

# Cloudflare Vectorize — banco vetorial do Vade Mecum
# Criar com: wrangler vectorize create studymaster-knowledge --dimensions=1024 --metric=cosine
[[vectorize]]
binding = "KNOWLEDGE_INDEX"
index_name = "studymaster-knowledge"
