name = "studymaster-worker"
main = "worker.js"
compatibility_date = "2024-01-01"

# Deploy: wrangler deploy
# Adicionar variĂ¡vel de ambiente via painel Cloudflare ou:
# wrangler secret put GROQ_API_KEY

[vars]
# NĂ£o coloque a chave aqui! Use wrangler secret ou o painel do Cloudflare
# Settings > Workers & Pages > studymaster-worker > Settings > Variables

# Cloudflare KV â€” cache de resultados RAG para reduzir latĂªncia e evitar rate limits
[[kv_namespaces]]
binding = "RAG_CACHE"
id = "d6bf7bb52f304aaab32e2387b505c4fe"

# Cloudflare AI â€” para geraĂ§Ă£o de embeddings (BGE-M3, 1024 dimensĂµes)
[ai]
binding = "AI"

# Cloudflare Vectorize â€” banco vetorial do Vade Mecum
# Criar com: wrangler vectorize create studymaster-knowledge --dimensions=1024 --metric=cosine
[[vectorize]]
binding = "KNOWLEDGE_INDEX"
index_name = "studymaster-knowledge"

# Cloudflare Vectorize — banco vetorial de Provas Reais (1024 dimensơes via BGE-M3)
[[vectorize]]
binding = "PROVAS_INDEX"
index_name = "studymaster-provas"


[[r2_buckets]]
binding = "PDF_STORAGE"
bucket_name = "studymaster-pdfs"

