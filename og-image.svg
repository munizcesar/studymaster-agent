<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">StudyMaster - Agente de Estudo com IA</title>
  <desc id="desc">Imagem de compartilhamento social com identidade premium do StudyMaster.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f6f2"/>
      <stop offset="1" stop-color="#ece8de"/>
    </linearGradient>
    <linearGradient id="premium" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#01696F"/>
      <stop offset="0.48" stop-color="#00A7B2"/>
      <stop offset="1" stop-color="#D4A827"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0c4e54" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1040" cy="90" r="190" fill="#ffffff" opacity="0.24"/>
  <circle cx="110" cy="560" r="170" fill="#ffffff" opacity="0.24"/>

  <g transform="translate(96 145)">
    <rect x="0" y="0" width="118" height="118" rx="34" fill="url(#premium)" filter="url(#softShadow)"/>
    <path d="M30 44h58M30 59h43M30 74h52" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>
    <circle cx="84" cy="74" r="14" fill="#ffffff"/>
    <path d="M80 74l4 4 8-8" stroke="#0E4F56" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="250" y="220" font-family="Inter, Arial, sans-serif" font-size="88" font-weight="800" fill="url(#premium)">StudyMaster</text>
  <text x="250" y="285" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="600" fill="#2f302e">Agente de Estudo com IA</text>

  <rect x="96" y="355" width="1008" height="154" rx="26" fill="#ffffff" opacity="0.75"/>
  <text x="136" y="420" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#1e1f1d">Monte prompts personalizados e estude com feedback imediato</text>
  <text x="136" y="468" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="500" fill="#4a4c49">Dificuldade, tipo de questão, modo de sessão e revisão inteligente</text>
</svg>