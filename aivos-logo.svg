<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 96" role="img" aria-labelledby="aivosLogoTitle aivosLogoDesc">
  <title id="aivosLogoTitle">AIVOS</title>
  <desc id="aivosLogoDesc">Logotipo AIVOS com simbolo abstrato de evolucao e wordmark com gradiente frio em AIV e quente em OS.</desc>
  <defs>
    <linearGradient id="aivosLogoCold" x1="15" y1="14" x2="63" y2="78" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0D47FF"/>
      <stop offset="0.52" stop-color="#00B8FF"/>
      <stop offset="1" stop-color="#7C4DFF"/>
    </linearGradient>
    <linearGradient id="aivosLogoHot" x1="42" y1="58" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C4DFF"/>
      <stop offset="0.55" stop-color="#FF2D20"/>
      <stop offset="1" stop-color="#FF6A00"/>
    </linearGradient>
    <linearGradient id="aivosWordCold" x1="102" y1="15" x2="212" y2="77" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0D47FF"/>
