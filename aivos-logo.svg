  <g>
    <path d="M16 78L42.3 21.8C45.9 14.2 56.7 14.2 60.3 21.8L82 68.6C85.6 76.3 76.3 83.3 69.8 77.8L52.1 62.6C49.6 60.4 45.8 60.4 43.3 62.6L26.6 77.1C20.2 82.7 12.4 85.7 16 78Z" fill="url(#aivosLogoHot)" opacity="0.95"/>
    <path d="M16 78L42.3 21.8C45.9 14.2 56.7 14.2 60.3 21.8L82 68.6" fill="none" stroke="url(#aivosLogoCold)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" filter="url(#aivosLogoGlow)"/>
    <path d="M36.3 71.7L49.2 59.9C51.6 57.6 55.4 57.6 57.9 59.9L73.8 73.8" fill="none" stroke="url(#aivosLogoHot)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
