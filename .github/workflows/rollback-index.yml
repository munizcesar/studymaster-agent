name: Rollback index.html
on:
  workflow_dispatch:
jobs:
  rollback:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Restore index.html from good commit and remove hero-badge
        run: |
          # Busca o arquivo diretamente do commit correto via API raw
          curl -sL "https://raw.githubusercontent.com/munizcesar/studymaster-agent/7b1526195a6208351a6e666e70232d8534884a51/index.html" -o index.html
          echo "Tamanho baixado: $(wc -c < index.html) bytes"
          # Remove hero-badge span do HTML
          python3 -c "
import re
with open('index.html','r',encoding='utf-8') as f:
    c = f.read()
c = c.lstrip('\ufeff')
c = re.sub(r'\s*<span class=\"hero-badge\">.*?</span>\n?', '', c)
c = re.sub(r'\n\s*\.hero-badge \{[^}]+\}', '', c)
print('hero-badge restantes:', c.count('hero-badge'))
print('Tamanho final:', len(c))
with open('index.html','w',encoding='utf-8') as f:
    f.write(c)
"
      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          git diff --cached --stat
          git commit -m 'fix: rollback index.html completo + remove hero-badge'
          git push
