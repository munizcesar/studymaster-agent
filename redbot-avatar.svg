<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4"/>
      <stop offset="50%" style="stop-color:#0E7490"/>
      <stop offset="100%" style="stop-color:#0369A1"/>
    </linearGradient>
    <linearGradient id="headGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9"/>
      <stop offset="50%" style="stop-color:#0284C7"/>
      <stop offset="100%" style="stop-color:#0369A1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="40%" style="stop-color:#E0F2FE"/>
      <stop offset="100%" style="stop-color:#BAE6FD"/>
    </radialGradient>
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#F0F9FF;stop-opacity:0.8"/>
      <stop offset="60%" style="stop-color:#E0F2FE;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="hatGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
    <linearGradient id="tasselGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0284C7" flood-opacity="0.3"/>
    </filter>
    <filter id="glowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background glow -->
  <rect width="400" height="400" rx="200" fill="url(#bgGlow)"/>

  <!-- Ears / Side panels -->
  <rect x="48" y="145" width="24" height="70" rx="12" fill="url(#bodyGrad)" filter="url(#shadow)"/>
  <rect x="328" y="145" width="24" height="70" rx="12" fill="url(#bodyGrad)" filter="url(#shadow)"/>
  <rect x="54" y="155" width="12" height="50" rx="6" fill="url(#accentGrad)"/>
  <rect x="334" y="155" width="12" height="50" rx="6" fill="url(#accentGrad)"/>

  <!-- Antenna -->
  <line x1="200" y1="65" x2="200" y2="40" stroke="#06B6D4" stroke-width="3" stroke-linecap="round"/>
  <circle cx="200" cy="35" r="8" fill="#22D3EE" filter="url(#glowFilter)"/>
  <circle cx="200" cy="35" r="3" fill="#FFFFFF" opacity="0.6"/>

  <!-- Body -->
  <rect x="80" y="240" width="240" height="130" rx="30" fill="url(#bodyGrad)" filter="url(#shadow)"/>

  <!-- Body panel / chest screen -->
  <rect x="125" y="255" width="150" height="60" rx="15" fill="#0F172A" opacity="0.5"/>
  <rect x="135" y="265" width="130" height="40" rx="10" fill="#1E293B"/>

  <!-- Chest screen content - smile -->
  <text x="200" y="291" font-family="monospace" font-size="18" fill="#22D3EE" text-anchor="middle" font-weight="bold">:)</text>

  <!-- Body buttons -->
  <circle cx="140" cy="340" r="8" fill="#F43F5E" opacity="0.8"/>
  <circle cx="170" cy="340" r="8" fill="#FBBF24" opacity="0.8"/>
  <circle cx="200" cy="340" r="8" fill="#22C55E" opacity="0.8"/>
  <circle cx="230" cy="340" r="8" fill="#3B82F6" opacity="0.8"/>
  <circle cx="260" cy="340" r="8" fill="#8B5CF6" opacity="0.8"/>

  <!-- Head -->
  <ellipse cx="200" cy="165" rx="120" ry="105" fill="url(#headGrad)" filter="url(#shadow)"/>

  <!-- Graduation Cap -->
  <g>
    <!-- Cap base -->
    <polygon points="100,75 200,45 300,75 200,105" fill="url(#hatGrad)" stroke="#1E293B" stroke-width="2"/>
    <!-- Cap brim -->
    <rect x="85" y="75" width="230" height="8" rx="4" fill="#1E293B"/>
    <!-- Cap border accent -->
    <polygon points="100,78 200,48 300,78 200,105" fill="none" stroke="#334155" stroke-width="1.5"/>
    <!-- Tassel button -->
    <circle cx="295" cy="60" r="5" fill="#FBBF24"/>
    <!-- Tassel string -->
    <path d="M295,65 Q305,85 310,100" fill="none" stroke="url(#tasselGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Tassel end -->
    <ellipse cx="312" cy="103" rx="6" ry="4" fill="url(#tasselGrad)"/>
    <line x1="312" y1="107" x2="314" y2="112" stroke="#D97706" stroke-width="1.5"/>
    <line x1="314" y1="107" x2="316" y2="112" stroke="#D97706" stroke-width="1.5"/>
    <line x1="310" y1="107" x2="312" y2="112" stroke="#D97706" stroke-width="1.5"/>
  </g>

  <!-- Face plate border / visor area -->
  <rect x="110" y="115" width="180" height="85" rx="20" fill="#0F172A" opacity="0.3"/>
  <rect x="115" y="120" width="170" height="75" rx="16" fill="#1E293B"/>

  <!-- Eyes -->
  <!-- Left eye -->
  <ellipse cx="155" cy="150" rx="28" ry="22" fill="url(#eyeGlow)" stroke="#0284C7" stroke-width="2"/>
  <ellipse cx="155" cy="150" rx="20" ry="15" fill="#FFFFFF"/>
  <ellipse cx="155" cy="150" rx="14" ry="10" fill="#BAE6FD"/>
  <!-- Left pupil -->
  <ellipse cx="160" cy="148" rx="7" ry="8" fill="#0369A1"/>
  <ellipse cx="158" cy="145" rx="3" ry="3" fill="#FFFFFF" opacity="0.8"/>

  <!-- Right eye -->
  <ellipse cx="245" cy="150" rx="28" ry="22" fill="url(#eyeGlow)" stroke="#0284C7" stroke-width="2"/>
  <ellipse cx="245" cy="150" rx="20" ry="15" fill="#FFFFFF"/>
  <ellipse cx="245" cy="150" rx="14" ry="10" fill="#BAE6FD"/>
  <!-- Right pupil -->
  <ellipse cx="250" cy="148" rx="7" ry="8" fill="#0369A1"/>
  <ellipse cx="248" cy="145" rx="3" ry="3" fill="#FFFFFF" opacity="0.8"/>

  <!-- Eye shine highlights -->
  <ellipse cx="148" cy="142" rx="5" ry="4" fill="#FFFFFF" opacity="0.5"/>
  <ellipse cx="238" cy="142" rx="5" ry="4" fill="#FFFFFF" opacity="0.5"/>

  <!-- Smile -->
  <path d="M160,180 Q200,200 240,180" fill="none" stroke="#22D3EE" stroke-width="3" stroke-linecap="round"/>

  <!-- Cheek blush -->
  <ellipse cx="130" cy="170" rx="12" ry="6" fill="#F43F5E" opacity="0.15"/>
  <ellipse cx="270" cy="170" rx="12" ry="6" fill="#F43F5E" opacity="0.15"/>

  <!-- Neck connector -->
  <rect x="175" y="220" width="50" height="25" rx="8" fill="#0369A1"/>
  <rect x="180" y="225" width="40" height="4" rx="2" fill="#22D3EE" opacity="0.5"/>
  <rect x="180" y="233" width="40" height="4" rx="2" fill="#22D3EE" opacity="0.5"/>

  <!-- Arms -->
  <!-- Left arm -->
  <path d="M80,250 Q60,290 70,330 Q75,345 90,340" fill="url(#bodyGrad)" stroke="#0284C7" stroke-width="1.5"/>
  <!-- Right arm -->
  <path d="M320,250 Q340,290 330,330 Q325,345 310,340" fill="url(#bodyGrad)" stroke="#0284C7" stroke-width="1.5"/>

  <!-- Hands -->
  <circle cx="88" cy="342" r="12" fill="#22D3EE"/>
  <circle cx="312" cy="342" r="12" fill="#22D3EE"/>

  <!-- Legs -->
  <rect x="130" y="365" width="40" height="25" rx="10" fill="#0369A1"/>
  <rect x="230" y="365" width="40" height="25" rx="10" fill="#0369A1"/>

  <!-- Feet -->
  <ellipse cx="150" cy="393" rx="30" ry="10" fill="#0E7490"/>
  <ellipse cx="250" cy="393" rx="30" ry="10" fill="#0E7490"/>

  <!-- Name badge on body -->
  <rect x="155" y="335" width="90" height="18" rx="6" fill="#06B6D4" opacity="0.3"/>
  <text x="200" y="348" font-family="sans-serif" font-size="9" fill="#22D3EE" text-anchor="middle" font-weight="bold" letter-spacing="1">REDBOT</text>

  <!-- Subtle sparkles -->
  <text x="60" y="90" font-size="16" opacity="0.4">✦</text>
  <text x="330" y="110" font-size="12" opacity="0.3">✦</text>
  <text x="340" y="60" font-size="10" opacity="0.3">✦</text>
</svg>
